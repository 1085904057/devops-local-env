version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: local-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=local_dev
      - TZ=Asia/Shanghai
    volumes:
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./data/mysql:/var/lib/mysql
    networks:
      - local-dev-network
  redis:
    image: redis:7-alpine
    container_name: local-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./config/redis/redis.conf:/etc/redis/redis.conf
      - ./data/redis:/data
    networks:
      - local-dev-network
  postgres:
    image: postgres:latest
    container_name: local-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=local_dev
      - TZ=Asia/Shanghai
    volumes:
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./data/postgres:/var/lib/postgresql
    command: -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - local-dev-network
  svix:
    image: svix/svix-server:latest
    container_name: local-svix
    restart: always
    ports:
      - "8071:8071"
    environment:
      - SVIX_JWT_SECRET=your-secret-key-change-in-production
      - SVIX_DB_DSN=postgresql://postgres:123456@postgres:5432/local_dev
      - SVIX_QUEUE_TYPE=memory
      - SVIX_REDIS_DSN=redis://redis:6379
      - RUST_LOG=info
    depends_on:
      - postgres
      - redis
    networks:
      - local-dev-network

networks:
  local-dev-network:
    driver: bridge