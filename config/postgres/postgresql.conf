# PostgreSQL Configuration File for Local Development
# 本地开发环境配置

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# 监听地址
listen_addresses = '*'

# 端口
port = 5432

# 最大连接数
max_connections = 100

#------------------------------------------------------------------------------
# MEMORY SETTINGS
#------------------------------------------------------------------------------

# 共享内存缓冲区大小
shared_buffers = 128MB

# 动态共享内存
dynamic_shared_memory_type = posix

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------

# 最小 WAL 级别
wal_level = replica

#------------------------------------------------------------------------------
# REPORTING AND LOGGING
#------------------------------------------------------------------------------

# 日志收集器
logging_collector = on

# 日志目录
log_directory = 'log'

# 日志文件名
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# 记录慢查询 (毫秒)
log_min_duration_statement = 1000

#------------------------------------------------------------------------------
# AUTOVACUUM
#------------------------------------------------------------------------------

autovacuum = on

#------------------------------------------------------------------------------
# DATE AND TIME FORMATTING
#------------------------------------------------------------------------------

# 时区设置
timezone = 'Asia/Shanghai'
